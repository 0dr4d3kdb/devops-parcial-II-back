version: '3.9'

services:

  mysql-db:
    image: mysql:8

    container_name: mysql-db

    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: innovadb
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin123

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql

  ventas-api:
    build:
      context: ./ventas

    container_name: ventas-api

    ports:
      - "8080:8080"

    environment:
      DB_ENDPOINT: mysql-db
      DB_PORT: 3306
      DB_NAME: innovadb
      DB_USERNAME: admin
      DB_PASSWORD: admin123

    depends_on:
      - mysql-db

  despacho-api:
    build:
      context: ./despacho

    container_name: despacho-api

    ports:
      - "8081:8081"

    environment:
      DB_ENDPOINT: mysql-db
      DB_PORT: 3306
      DB_NAME: innovadb
      DB_USERNAME: admin
      DB_PASSWORD: admin123

    depends_on:
      - mysql-db

volumes:
  mysql_data: